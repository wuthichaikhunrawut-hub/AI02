[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[functions]
  directory = "functions"

[build.environment]
  NPM_CONFIG_PRODUCTION = "false"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
